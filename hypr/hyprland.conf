################
### MONITORS ###
################
monitor=HDMI-A-1,1920x1080@180,0x0,1,transform,2
monitor=eDP-1,disable
# See https://wiki.hypr.land/Configuring/Monitors/

misc {
    vfr = true
}

env = __GL_SYNC_TO_VBLANK,0
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprpaper
exec-once = swaybg -i ~/Pictures/wallpapers/wall2.png -m fill
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swaybg
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = waybar > /dev/null 2>&1
exec-once = ~/.config/hypr/scripts/lang_osd.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Шлях до теми (важливо для GTK програм, як-от браузер)
env = XCURSOR_THEME,Bibata-Modern-Ice
# Розмір курсору (зазвичай 24 - норм-ня!)
env = XCURSOR_SIZE,24

# Це для сучасних Wayland програм
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24


