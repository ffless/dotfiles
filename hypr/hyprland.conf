#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 15

    border_size = 0
    # Чорний колір з прозорістю (88 — це приблизно 50%)
    #col.active_border = rgba(00000088) 
    #col.inactive_border = rgba(00000000) # Неактивні вікна без рамок
    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color1_alpha $color2_alpha 45deg
    col.inactive_border = rgba(00000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    rounding = 10

    # Налаштування прозорості:
    # Активне (твої 30%): 0.3 (це дасть 70% видимості блюру)
    # Неактивне (майже непрозоре): 0.92 (це дасть лише ~8% видимості блюру)
    active_opacity = 0.92
    inactive_opacity = 0.5

    blur {
enabled = true
        
        # Ідеальні пропорції для "кремового" дорогого скла
        size = 5
        passes = 4
        
        # НАЙВАЖЛИВІШЕ: відв'язуємо блюр від прозорості вікна!
        ignore_opacity = true
        
        # Робимо скло кришталево чистим
        new_optimizations = true
        xray = false
        
        # Корекція кольору, щоб шпалери красиво просвічувались
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations

animations {
    enabled = yes

    # 1. Ті самі ідеальні криві Material You (без відскоків)
    bezier = md3_decel, 0.05, 0.7, 0.1, 1   # М'яке і дуже плавне гальмування
    bezier = md3_accel, 0.3, 0, 0.8, 0.15   # Акуратне прискорення для закриття
    bezier = liner, 1, 1, 1, 1              

    # 2. Відкриття та закриття: суворо знизу, плавно і без баунсу
    animation = windows, 1, 4, md3_decel, slide bottom
    animation = windowsIn, 1, 4, md3_decel, slide bottom
    animation = windowsOut, 1, 4, md3_accel, slide bottom
    
    # 3. Переміщення вікон і перемикання робочих столів (збережено, як ти просив)
    animation = windowsMove, 1, 4, md3_decel, slide
    animation = workspaces, 1, 5, md3_decel, slide

    # 4. Інші дрібниці
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 3, md3_decel
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
